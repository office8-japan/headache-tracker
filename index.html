<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>頭痛記録ノート</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'sans-serif'; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-10 text-gray-800">

    <header class="bg-indigo-600 text-white p-4 shadow-lg mb-6 text-center">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">🤕 頭痛記録ノート</h1>
            <span id="currentDate" class="text-sm opacity-90"></span>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 space-y-6">

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-lg font-semibold mb-4 border-b pb-2">状況を記録</h2>
            <form id="headacheForm" class="space-y-4">
                
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">発生日時</label>
                    <input type="datetime-local" id="recordTime" required
                           class="w-full border-gray-300 rounded-lg shadow-sm focus:border-indigo-500 focus:ring-indigo-500 border p-2 bg-white">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2 mt-4">痛みの強さ (1-5)</label>
                    <input type="range" id="intensity" min="1" max="5" value="3" step="1" 
                           class="w-full h-3 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                    <div class="flex justify-between text-xs text-gray-500 mt-2 font-bold px-1">
                        <span class="text-blue-500">1:かすか</span>
                        <span class="text-yellow-600">3:普通</span>
                        <span class="text-red-500">5:動けない</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mt-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">部位</label>
                        <select id="location" class="w-full border-gray-300 rounded-lg shadow-sm focus:border-indigo-500 focus:ring-indigo-500 border p-2 bg-white">
                            <option>こめかみ</option>
                            <option>後頭部</option>
                            <option>目の奥</option>
                            <option>全体的</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">薬の服用</label>
                        <select id="medication" class="w-full border-gray-300 rounded-lg shadow-sm focus:border-indigo-500 focus:ring-indigo-500 border p-2 bg-white">
                            <option>なし</option>
                            <option>あり</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">メモ</label>
                    <textarea id="memo" rows="2" class="w-full border-gray-300 rounded-lg shadow-sm focus:border-indigo-500 focus:ring-indigo-500 border p-2" placeholder="睡眠不足、天候、ストレスなど..."></textarea>
                </div>

                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition duration-200 active:scale-95 shadow-md">
                    記録を保存する
                </button>
            </form>
        </section>

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-lg font-semibold mb-4 border-b pb-2">痛みの推移 (直近14回)</h2>
            <div class="h-48">
                <canvas id="headacheChart"></canvas>
            </div>
        </section>

        <section>
            <h2 class="text-lg font-semibold mb-3 text-gray-700">最近の記録</h2>
            <div id="historyList" class="space-y-3">
                </div>
            
            <button id="clearData" class="mt-8 text-sm text-red-400 hover:text-red-600 hover:underline w-full text-center">
                データをすべて消去する
            </button>
        </section>

    </main>

    <script>
        // 今日の日付を表示
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });

        let records = JSON.parse(localStorage.getItem('headacheRecords')) || [];
        let myChart;

        // 入力フォームの日時を「現在時刻」にセットする関数
        function setDefaultTime() {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('recordTime').value = now.toISOString().slice(0, 16);
        }

        // フォーム送信時の処理
        document.getElementById('headacheForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            // 入力された日時を取得
            const inputTime = new Date(document.getElementById('recordTime').value);
            
            const newRecord = {
                id: Date.now(),
                date: inputTime.toLocaleString('ja-JP', {month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'}),
                timestamp: inputTime.getTime(),
                intensity: parseInt(document.getElementById('intensity').value),
                location: document.getElementById('location').value,
                medication: document.getElementById('medication').value,
                memo: document.getElementById('memo').value
            };

            records.unshift(newRecord);
            // タイムスタンプ順（新しいものが上）に並び替えて保存
            records.sort((a, b) => b.timestamp - a.timestamp);
            localStorage.setItem('headacheRecords', JSON.stringify(records));
            
            updateUI();
            
            // フォームをリセットし、日時を現在時刻に戻す
            document.getElementById('intensity').value = 3;
            document.getElementById('memo').value = '';
            setDefaultTime();
        });

        function updateUI() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';

            if (records.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-400 py-4">まだ記録がありません</p>';
            }

            records.forEach(r => {
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex justify-between items-start";
                div.innerHTML = `
                    <div class="flex-1">
                        <div class="text-[11px] text-gray-500 font-bold tracking-wide">${r.date}</div>
                        <div class="font-bold text-gray-800 text-md mt-1">${r.location} / 強さ: ${r.intensity}</div>
                        <div class="text-sm text-gray-500 mt-1">${r.memo || 'メモなし'}</div>
                    </div>
                    <div class="ml-2">
                        <span class="px-2 py-1 rounded-full text-[10px] font-bold ${r.medication === 'あり' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-400'}">
                            薬:${r.medication}
                        </span>
                    </div>
                `;
                list.appendChild(div);
            });

            updateChart();
        }

        function updateChart() {
            const ctx = document.getElementById('headacheChart').getContext('2d');
            // グラフ用には古い順に並び替えて最新14件を取得（時間変化を見るため件数を増加）
            const displayData = [...records].sort((a, b) => a.timestamp - b.timestamp).slice(-14);

            if (myChart) myChart.destroy();
            
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    // ラベルに日付と時間を表示 (例: "03/08 14:00")
                    labels: displayData.map(r => r.date), 
                    datasets: [{
                        label: '痛みの強さ',
                        data: displayData.map(r => r.intensity),
                        borderColor: '#4f46e5',
                        backgroundColor: 'rgba(79, 70, 229, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 4,
                        pointBackgroundColor: '#4f46e5'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { 
                        y: { 
                            min: 0, 
                            max: 5, 
                            ticks: { stepSize: 1, font: { size: 10 } }
                        },
                        x: {
                            ticks: { 
                                font: { size: 9 },
                                maxRotation: 45, // ラベルが重ならないように少し傾ける
                                minRotation: 45
                            }
                        }
                    },
                    plugins: { 
                        legend: { display: false }
                    }
                }
            });
        }

        document.getElementById('clearData').addEventListener('click', () => {
            if(confirm('今までの記録がすべて消えます。本当によろしいですか？')) {
                localStorage.removeItem('headacheRecords');
                records = [];
                updateUI();
            }
        });

        // 起動時の初期化処理
        setDefaultTime();
        updateUI();
    </script>
</body>
</html>
